name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        run: npm install

      - name: Sync Capacitor web assets
        run: npx cap sync ios

      - name: Build unsigned .app
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            clean build

      - name: Package into .ipa (unsigned)
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r PlanejadorVooDJI.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: PlanejadorVooDJI-ipa
          path: PlanejadorVooDJI.ipa
